<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精算利率监测平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;padding:20px}

/* ── 页面头部 ── */
.header{text-align:center;padding:20px 0 12px}
.header h1{font-size:26px;color:#1a3c6e;margin-bottom:4px}
.header .sub{font-size:13px;color:#888}

/* ── 模式切换器 ── */
.mode-switcher{max-width:960px;margin:0 auto 16px;display:flex;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.mode-tab{flex:1;text-align:center;padding:14px 8px;cursor:pointer;font-size:14px;font-weight:600;color:#888;border-bottom:3px solid transparent;transition:all .2s;position:relative}
.mode-tab:hover{color:#1a3c6e;background:#f8f9fb}
.mode-tab.active{color:#2e75b6;border-bottom-color:#2e75b6;background:#f0f5fb}
.mode-tab .tab-num{display:block;font-size:20px;margin-bottom:2px}

/* ── 工具栏 ── */
.toolbar{max-width:1400px;margin:0 auto 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#fff;padding:12px 20px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.toolbar label{font-size:13px;color:#666;white-space:nowrap}
.toolbar select,.toolbar input{font-size:13px;padding:4px 8px;border:1px solid #ddd;border-radius:4px}
.toolbar button{font-size:13px;padding:5px 14px;background:#2e75b6;color:#fff;border:none;border-radius:4px;cursor:pointer}
.toolbar button:hover{background:#1a3c6e}

/* ── 汇总卡片 ── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;max-width:1400px;margin:0 auto 16px}
.summary-card{background:#fff;border-radius:8px;padding:12px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.summary-card .title{font-size:13px;color:#888;margin-bottom:4px}
.summary-card .value{font-size:24px;font-weight:700;color:#1a3c6e}
.summary-card .change{font-size:12px;margin-top:2px}

/* ── 图表网格 ── */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(520px,1fr));gap:16px;max-width:1400px;margin:0 auto}
.chart-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px 20px}
.chart-card h2{font-size:15px;color:#1a3c6e;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #2e75b6}
.chart{width:100%;height:360px}

/* ── 表格 ── */
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th,td{padding:5px 8px;text-align:center;border:1px solid #e8e8e8}
th{background:#f5f7fa;color:#555;font-weight:600}
td.up{color:#c0392b}
td.down{color:#27ae60}
td.warn{background:#fff3cd}

/* ── 模式内容区 ── */
.mode-content{display:none}
.mode-content.active{display:block}

/* ── 页脚 ── */
.footer{text-align:center;padding:20px;color:#aaa;font-size:12px}
</style>
</head>
<body>

<!-- ═══════════ 页面头部 ═══════════ -->
<div class="header">
  <h1>📈 精算利率监测平台</h1>
  <div class="sub" id="updateTime">数据加载中...</div>
</div>

<!-- ═══════════ 模式切换器 ═══════════ -->
<div class="mode-switcher">
  <div class="mode-tab active" data-mode="mode1" onclick="switchMode('mode1')">
    <span class="tab-num">①</span>折现率溢价（750）
  </div>
  <div class="mode-tab" data-mode="mode2" onclick="switchMode('mode2')">
    <span class="tab-num">②</span>折现率溢价（当日线）
  </div>
  <div class="mode-tab" data-mode="mode3" onclick="switchMode('mode3')">
    <span class="tab-num">③</span>预定利率动态追踪
  </div>
</div>

<!-- ═══════════ 工具栏（所有模式共用） ═══════════ -->
<div class="toolbar">
  <label>曲线：</label>
  <select id="curveSelect">
    <option value="gov_spot">国债即期</option>
    <option value="cdb_spot">国开债即期</option>
    <option value="gov_ytm">国债到期</option>
    <option value="cdb_ytm">国开债到期</option>
  </select>
  <label>基准日：</label>
  <input type="date" id="datePicker">
  <button onclick="refresh()">刷新</button>
  <span style="font-size:12px;color:#999;margin-left:8px" id="dateInfo"></span>
</div>

<!-- ═══════════ 模式一：折现率溢价（750） ═══════════ -->
<div class="mode-content active" id="mode1">
  <div class="summary-grid" id="m1Summary"></div>
  <div class="chart-grid">
    <div class="chart-card">
      <h2>📉 收益率曲线（即期 vs 750MA）</h2>
      <div class="chart" id="m1ChartCurve"></div>
    </div>
    <div class="chart-card">
      <h2>📊 期限利差走势</h2>
      <div class="chart" id="m1ChartSpread"></div>
    </div>
    <div class="chart-card">
      <h2>📋 关键期限 vs 750MA 偏离</h2>
      <div id="m1TableKey"></div>
    </div>
    <div class="chart-card">
      <h2>📅 10Y 实际 vs 750MA 历史走势</h2>
      <div class="chart" id="m1ChartHistory"></div>
    </div>
  </div>
</div>

<!-- ═══════════ 模式二：折现率溢价（当日线） ═══════════ -->
<div class="mode-content" id="mode2">
  <div class="summary-grid" id="m2Summary"></div>
  <div class="chart-grid">
    <div class="chart-card">
      <h2>📉 即期收益率曲线（四条对比）</h2>
      <div class="chart" id="m2ChartSpot"></div>
    </div>
    <div class="chart-card">
      <h2>💳 信用溢价（国开-国债利差）</h2>
      <div class="chart" id="m2ChartCredit"></div>
    </div>
    <div class="chart-card">
      <h2>📋 关键期限即期收益率</h2>
      <div id="m2TableKey"></div>
    </div>
    <div class="chart-card">
      <h2>📅 信用溢价历史走势</h2>
      <div class="chart" id="m2ChartCreditHistory"></div>
    </div>
  </div>
</div>

<!-- ═══════════ 模式三：预定利率动态追踪 ═══════════ -->
<div class="mode-content" id="mode3">
  <div class="summary-grid" id="m3Summary"></div>
  <div class="chart-grid">
    <div class="chart-card">
      <h2>🏦 利率走廊</h2>
      <div class="chart" id="m3ChartCorridor"></div>
    </div>
    <div class="chart-card">
      <h2>📊 基础回报水平</h2>
      <div class="chart" id="m3ChartBase"></div>
    </div>
    <div class="chart-card">
      <h2>📋 分段调节系数表</h2>
      <div id="m3TableCoeff"></div>
    </div>
    <div class="chart-card">
      <h2>📅 预定利率基准 N 历史走势</h2>
      <div class="chart" id="m3ChartN"></div>
    </div>
  </div>
</div>

<div class="footer">数据来源：中国债券信息网 (yield.chinabond.com.cn) ｜ 自动更新于每日17:30</div>

<!-- ═══════════ JavaScript ═══════════ -->
<script>
// ── 数据 & 配置 ──
const DATA_FILES = {
  gov_spot: 'data.json',
  cdb_spot: 'data_cdb.json',
  gov_ytm: 'data_gov_ytm.json',
  cdb_ytm: 'data_cdb_ytm.json'
};
const CURVE_NAMES = { gov_spot:'国债即期', cdb_spot:'国开债即期', gov_ytm:'国债到期', cdb_ytm:'国开债到期' };
const KEY_TERMS = ['1Y','3Y','5Y','7Y','10Y','15Y','20Y','30Y','50Y'];

let allData = {};
let currentMode = 'mode1';
let currentCurve = 'gov_spot';
let selectedDate = '';

// ── 模式切换 ──
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
  document.getElementById(mode).classList.add('active');
  renderAll();
}

// ── 工具函数 ──
function getData(curveKey) { return allData[curveKey] || { dates:[], terms:[], rows:[] }; }
function findDateIndex(data, date) { return data.dates.indexOf(date); }
function getRow(data, date) {
  const idx = findDateIndex(data, date);
  return idx >= 0 ? data.rows[idx] : null;
}
function getTermValue(row, data, term) {
  const idx = data.terms.indexOf(term);
  return idx >= 0 && row ? row[idx] : null;
}
function fmtBP(v) {
  if (v == null) return '—';
  const bp = (v * 100).toFixed(1);
  return `<span class="${v>0?'up':v<0?'down':''}">${v>0?'+':''}${bp} bp</span>`;
}

// ── 750MA 计算 ──
function calc750MA(data, targetDate) {
  const targetIdx = findDateIndex(data, targetDate);
  if (targetIdx < 0) return null;
  const terms = data.terms;
  const ma = new Array(terms.length).fill(null);
  const startIdx = Math.max(0, targetIdx - 250);
  const count = targetIdx - startIdx + 1;
  if (count < 20) return ma;
  for (let j = 0; j < terms.length; j++) {
    let sum = 0, n = 0;
    for (let i = startIdx; i <= targetIdx; i++) {
      if (data.rows[i][j] != null) { sum += data.rows[i][j]; n++; }
    }
    if (n > 0) ma[j] = +(sum / n).toFixed(6);
  }
  return ma;
}

// ── 初始化 ──
async function init() {
  const promises = Object.entries(DATA_FILES).map(async ([key, file]) => {
    try { const resp = await fetch(file); allData[key] = await resp.json(); }
    catch(e) { console.warn(`加载 ${file} 失败:`, e); }
  });
  await Promise.all(promises);
  
  if (allData.gov_spot && allData.gov_spot.dates.length > 0) {
    selectedDate = allData.gov_spot.dates[allData.gov_spot.dates.length - 1];
    document.getElementById('datePicker').value = selectedDate;
  }
  
  document.getElementById('updateTime').textContent = 
    `数据更新至 ${selectedDate} ｜ 自动抓取自中国债券信息网`;
  
  document.getElementById('curveSelect').addEventListener('change', refresh);
  document.getElementById('datePicker').addEventListener('change', refresh);
  
  renderAll();
}

function refresh() {
  currentCurve = document.getElementById('curveSelect').value;
  selectedDate = document.getElementById('datePicker').value;
  if (!selectedDate && allData[currentCurve]) {
    selectedDate = allData[currentCurve].dates[allData[currentCurve].dates.length - 1];
    document.getElementById('datePicker').value = selectedDate;
  }
  renderAll();
}

// ── 总渲染入口 ──
function renderAll() {
  const data = getData(currentCurve);
  if (!data.dates.length) return;
  
  const row = getRow(data, selectedDate);
  const dateIdx = findDateIndex(data, selectedDate);
  
  // 前一个交易日
  let prevRow = null;
  if (dateIdx > 0) prevRow = data.rows[dateIdx - 1];
  
  // 上月末
  let lastMonthRow = null;
  const sd = new Date(selectedDate);
  for (let i = dateIdx; i >= 0; i--) {
    const d = new Date(data.dates[i]);
    if (d.getMonth() !== sd.getMonth() || d.getFullYear() !== sd.getFullYear()) {
      lastMonthRow = data.rows[i]; break;
    }
  }
  
  document.getElementById('dateInfo').textContent = 
    `共 ${data.dates.length} 个交易日 ｜ ${data.dates[0]} ~ ${data.dates[data.dates.length-1]}`;
  
  // 按模式渲染
  switch(currentMode) {
    case 'mode1': renderMode1(data, row, prevRow, lastMonthRow); break;
    case 'mode2': renderMode2(data, row, prevRow, lastMonthRow); break;
    case 'mode3': renderMode3(data, row); break;
  }
}

// ═══════════════════════════════════════════════
//  模式一：折现率溢价（750）
// ═══════════════════════════════════════════════
function renderMode1(data, row, prevRow, lastMonthRow) {
  const maRow = calc750MA(data, selectedDate);
  
  // 汇总卡片（基于 750MA）
  const cards = ['10Y','5Y','1Y','1Y-10Y'].map(k => {
    let val, change;
    if (k === '1Y-10Y') {
      // 基于 750MA 的利差
      const idx1 = data.terms.indexOf('1Y'), idx10 = data.terms.indexOf('10Y');
      const y1MA = (idx1>=0 && maRow[idx1]!=null) ? maRow[idx1] : null;
      const y10MA = (idx10>=0 && maRow[idx10]!=null) ? maRow[idx10] : null;
      val = (y1MA!=null && y10MA!=null) ? +(y10MA - y1MA).toFixed(4) : null;
      change = null; // 750MA 利差日变动意义不大
      return {label:'1Y-10Y 利差(750MA)', val: val!=null ? (val*100).toFixed(0)+'bp' : '—', change};
    }
    val = getTermValue(row, data, k);
    const pv = getTermValue(prevRow, data, k);
    change = (val!=null && pv!=null) ? +(val - pv).toFixed(4) : null;
    return {label:`${k} 收益率`, val: val!=null ? val.toFixed(4)+'%' : '—', change};
  }).map(x => {
    const cls = x.change > 0 ? 'up' : x.change < 0 ? 'down' : '';
    const chg = x.change != null ? `<span class="change ${cls}">${x.change>0?'+':''}${(x.change*100).toFixed(1)}bp</span>` : '';
    return `<div class="summary-card"><div class="title">${x.label}</div><div class="value">${x.val}</div>${chg}</div>`;
  }).join('');
  document.getElementById('m1Summary').innerHTML = cards;
  
  // 收益率曲线 vs 750MA
  (function() {
    const dom = document.getElementById('m1ChartCurve');
    const chart = echarts.init(dom);
    const terms = data.terms.filter(t => getTermValue(row, data, t) != null);
    chart.setOption({
      tooltip: { trigger: 'axis' },
      legend: { data: ['即期利率','750日均线'], top: 5 },
      grid: { left: 50, right: 20, top: 40, bottom: 25 },
      xAxis: { type: 'category', data: terms.map(t=>t.replace('Y','')), name:'期限(年)', nameGap:25 },
      yAxis: { type: 'value', name:'%', axisLabel: { formatter: v=>v.toFixed(1) } },
      series: [
        { name:'即期利率', type:'line', data: terms.map(t=>getTermValue(row,data,t)), smooth:true, symbol:'circle', symbolSize:5, lineStyle:{color:'#2e75b6',width:2.5}, itemStyle:{color:'#2e75b6'} },
        { name:'750日均线', type:'line', data: maRow ? terms.map(t=>{const i=data.terms.indexOf(t); return i>=0&&maRow[i]!=null?maRow[i]:null;}) : [], smooth:true, symbol:'diamond', symbolSize:4, lineStyle:{color:'#e67e22',width:2,type:'dashed'}, itemStyle:{color:'#e67e22'} }
      ]
    });
  })();
  
  // 期限利差（基于 750MA）
  (function() {
    const dom = document.getElementById('m1ChartSpread');
    const chart = echarts.init(dom);
    const pairs = [{name:'10Y-1Y',s:'1Y',l:'10Y'},{name:'30Y-10Y',s:'10Y',l:'30Y'},{name:'5Y-1Y',s:'1Y',l:'5Y'}];
    
    // 预计算各期限 750MA 序列
    const allDates = data.dates;
    const maCache = {};
    [pairs[0].s, pairs[0].l, pairs[1].l, pairs[2].l].filter((v,i,a)=>a.indexOf(v)===i).forEach(term => {
      const termIdx = data.terms.indexOf(term);
      if (termIdx < 0) return;
      const vals = data.rows.map(r => r[termIdx]);
      const ma = [];
      for (let i = 0; i < vals.length; i++) {
        const start = Math.max(0, i - 250);
        let sum = 0, n = 0;
        for (let j = start; j <= i; j++) { if (vals[j] != null) { sum += vals[j]; n++; } }
        ma.push(n > 0 ? +(sum/n).toFixed(6) : null);
      }
      maCache[term] = ma;
    });
    
    const displayDates = allDates.slice(-250);
    const series = pairs.map(p => ({
      name: p.name, type: 'line', smooth: true, symbol: 'none',
      data: displayDates.map(d => {
        const idx = findDateIndex(data, d);
        if (idx < 0) return null;
        const sMA = maCache[p.s] ? maCache[p.s][idx] : null;
        const lMA = maCache[p.l] ? maCache[p.l][idx] : null;
        return (sMA != null && lMA != null) ? +((lMA - sMA) * 100).toFixed(2) : null;
      })
    }));
    
    // 所选日 MA 利差标注
    let spreadText = '';
    const selIdx = findDateIndex(data, selectedDate);
    if (selIdx >= 0) {
      spreadText = pairs.map(p => {
        const sMA = maCache[p.s] ? maCache[p.s][selIdx] : null;
        const lMA = maCache[p.l] ? maCache[p.l][selIdx] : null;
        return (sMA != null && lMA != null) ? `${p.name}: ${((lMA - sMA) * 100).toFixed(1)}bp` : '';
      }).filter(Boolean).join('  ');
    }
    chart.setOption({
      tooltip: { trigger: 'axis' },
      legend: { data: pairs.map(p=>p.name), top: 0 },
      grid: { left: 50, right: 20, top: 50, bottom: 40 },
      graphic: spreadText ? [{ type:'text', right:20, top:28, style:{text:spreadText,fontSize:12,fill:'#333',fontWeight:'bold'} }] : [],
      xAxis: { type:'category', data: displayDates.map(d=>d.slice(5)), axisLabel:{rotate:45,fontSize:10} },
      yAxis: { type:'value', name:'bp', axisLabel:{formatter:v=>v.toFixed(0)} },
      series
    });
  })();
  
  // 关键期限 vs 750MA
  (function() {
    const terms = KEY_TERMS.filter(t => data.terms.includes(t));
    let html = `<table><tr><th>期限</th><th>所选日 (%)</th><th>750MA (%)</th><th>偏离 (bp)</th><th>日变动 (bp)</th><th>月变动 (bp)</th></tr>`;
    terms.forEach(t => {
      const v = getTermValue(row, data, t);
      const ma = maRow ? (()=>{const i=data.terms.indexOf(t); return i>=0&&maRow[i]!=null?maRow[i]:null;})() : null;
      const pv = getTermValue(prevRow, data, t);
      const mv = getTermValue(lastMonthRow, data, t);
      const dev = (v!=null && ma!=null) ? (v-ma)*100 : null;
      const dayChg = (v!=null && pv!=null) ? (v-pv)*100 : null;
      const monChg = (v!=null && mv!=null) ? (v-mv)*100 : null;
      html += `<tr>
        <td style="font-weight:600">${t}</td>
        <td>${v!=null ? v.toFixed(4) : '—'}</td>
        <td style="color:#e67e22">${ma!=null ? ma.toFixed(4) : '—'}</td>
        <td class="${dev>0?'up':'down'}">${dev!=null ? (dev>0?'+':'')+dev.toFixed(1) : '—'}</td>
        <td class="${dayChg>0?'up':dayChg<0?'down':''}">${dayChg!=null ? (dayChg>0?'+':'')+dayChg.toFixed(1) : '—'}</td>
        <td class="${monChg>0?'up':monChg<0?'down':''}">${monChg!=null ? (monChg>0?'+':'')+monChg.toFixed(1) : '—'}</td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('m1TableKey').innerHTML = html;
  })();
  
  // 10Y 历史 vs 750MA
  (function() {
    const dom = document.getElementById('m1ChartHistory');
    const chart = echarts.init(dom);
    const term10Idx = data.terms.indexOf('10Y');
    if (term10Idx < 0) return;
    const values = data.rows.map(r => r[term10Idx]);
    const maValues = [];
    for (let i = 0; i < values.length; i++) {
      const start = Math.max(0, i - 250);
      let sum = 0, n = 0;
      for (let j = start; j <= i; j++) { if (values[j] != null) { sum += values[j]; n++; } }
      maValues.push(n > 0 ? +(sum/n).toFixed(4) : null);
    }
    chart.setOption({
      tooltip: { trigger:'axis' },
      legend: { data:['10Y收益率','750MA'], top:5 },
      grid: { left:50, right:20, top:40, bottom:40 },
      xAxis: { type:'category', data: data.dates.map(d=>d.slice(0,7)), axisLabel:{rotate:45,fontSize:9,interval:Math.floor(data.dates.length/12)} },
      yAxis: { type:'value', name:'%', axisLabel:{formatter:v=>v.toFixed(2)} },
      series: [
        { name:'10Y收益率', type:'line', data:values, symbol:'none', lineStyle:{color:'#2e75b6',width:1.5} },
        { name:'750MA', type:'line', data:maValues, symbol:'none', lineStyle:{color:'#e67e22',width:2} }
      ]
    });
  })();
}

// ═══════════════════════════════════════════════
//  模式二：折现率溢价（当日线）
// ═══════════════════════════════════════════════
function renderMode2(data, row, prevRow, lastMonthRow) {
  // 汇总卡片
  const spot = getData('gov_spot'), spotRow = getRow(spot, selectedDate);
  const ytm = getData('gov_ytm'), ytmRow = getRow(ytm, selectedDate);
  const cdb_spot = getData('cdb_spot'), cdbRow = getRow(cdb_spot, selectedDate);
  
  const y10_s = getTermValue(spotRow, spot, '10Y');
  const y1_s = getTermValue(spotRow, spot, '1Y');
  const y10_y = getTermValue(ytmRow, ytm, '10Y');
  const cdb10 = getTermValue(cdbRow, cdb_spot, '10Y');
  
  const spread10Y1Y = (y10_s!=null && y1_s!=null) ? +((y10_s - y1_s)*100).toFixed(0) : null;
  const creditSpread = (cdb10!=null && y10_y!=null) ? +((cdb10 - y10_y)*100).toFixed(0) : null;
  const curveShape = spread10Y1Y != null ? (spread10Y1Y > 80 ? '陡峭 ↑' : spread10Y1Y < 30 ? '平坦(倒挂风险)' : '正常') : '—';
  
  document.getElementById('m2Summary').innerHTML = [
    {label:'10Y 国债即期', val: y10_s!=null ? y10_s.toFixed(4)+'%' : '—'},
    {label:'10Y 国债到期', val: y10_y!=null ? y10_y.toFixed(4)+'%' : '—'},
    {label:'10Y 信用溢价', val: creditSpread!=null ? creditSpread+'bp' : '—'},
    {label:'曲线形态(10-1Y)', val: spread10Y1Y!=null ? spread10Y1Y+'bp' : '—', note: curveShape},
  ].map(x => `<div class="summary-card"><div class="title">${x.label}</div><div class="value">${x.val}</div>${x.note ? `<div class="change">${x.note}</div>` : ''}</div>`).join('');
  
  // 四条即期曲线对比
  (function() {
    const dom = document.getElementById('m2ChartSpot');
    const chart = echarts.init(dom);
    const curves = [
      {key:'gov_spot', name:'国债即期', color:'#2e75b6'},
      {key:'cdb_spot', name:'国开即期', color:'#e74c3c'},
      {key:'gov_ytm', name:'国债到期', color:'#27ae60'},
      {key:'cdb_ytm', name:'国开到期', color:'#8e44ad'},
    ];
    const terms = spot.terms.filter(t => getTermValue(spotRow, spot, t) != null);
    chart.setOption({
      tooltip: { trigger:'axis' },
      legend: { data: curves.map(c=>c.name), top:5 },
      grid: { left:50, right:20, top:40, bottom:25 },
      xAxis: { type:'category', data: terms.map(t=>t.replace('Y','')), name:'期限(年)', nameGap:25 },
      yAxis: { type:'value', name:'%', axisLabel:{formatter:v=>v.toFixed(1)} },
      series: curves.map(c => ({
        name: c.name, type:'line', smooth:true, symbol:'none',
        data: terms.map(t => getTermValue(getRow(getData(c.key), selectedDate), getData(c.key), t)),
        lineStyle:{color:c.color, width:2}
      }))
    });
  })();
  
  // 信用溢价（国开-国债）即期
  (function() {
    const dom = document.getElementById('m2ChartCredit');
    const chart = echarts.init(dom);
    const terms = spot.terms.filter(t => getTermValue(spotRow, spot, t)!=null && getTermValue(cdbRow, cdb_spot, t)!=null);
    const credits = terms.map(t => {
      const g = getTermValue(spotRow, spot, t), c = getTermValue(cdbRow, cdb_spot, t);
      return (g!=null && c!=null) ? +((c-g)*100).toFixed(2) : null;
    });
    chart.setOption({
      tooltip: { trigger:'axis', formatter: p => p[0] ? `${p[0].axisValue}年<br/>信用溢价: ${p[0].value}bp` : '' },
      grid: { left:50, right:20, top:30, bottom:25 },
      xAxis: { type:'category', data: terms.map(t=>t.replace('Y','')), name:'期限(年)', nameGap:25 },
      yAxis: { type:'value', name:'bp' },
      series: [{ name:'信用溢价', type:'bar', data:credits, itemStyle:{color: params => params.value > 0 ? '#c0392b' : '#27ae60'} }]
    });
  })();
  
  // 关键期限即期收益
  (function() {
    const terms = KEY_TERMS.filter(t => spot.terms.includes(t));
    let html = `<table><tr><th>期限</th><th>国债即期 (%)</th><th>国债到期 (%)</th><th>国开即期 (%)</th><th>即期-到期差 (bp)</th></tr>`;
    terms.forEach(t => {
      const gs = getTermValue(spotRow, spot, t), gy = getTermValue(ytmRow, ytm, t);
      const cs = getTermValue(cdbRow, cdb_spot, t);
      const diff = (gs!=null && gy!=null) ? (gs-gy)*100 : null;
      html += `<tr>
        <td style="font-weight:600">${t}</td>
        <td>${gs!=null ? gs.toFixed(4) : '—'}</td>
        <td>${gy!=null ? gy.toFixed(4) : '—'}</td>
        <td>${cs!=null ? cs.toFixed(4) : '—'}</td>
        <td class="${diff>0?'up':'down'}">${diff!=null ? (diff>0?'+':'')+diff.toFixed(1) : '—'}</td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('m2TableKey').innerHTML = html;
  })();
  
  // 信用溢价历史走势
  (function() {
    const dom = document.getElementById('m2ChartCreditHistory');
    const chart = echarts.init(dom);
    const gData = getData('gov_ytm'), cData = getData('cdb_ytm');
    const term10G = gData.terms.indexOf('10Y'), term10C = cData.terms.indexOf('10Y');
    if (term10G < 0 || term10C < 0) return;
    const credits = [];
    const dates = [];
    for (let i = 0; i < Math.max(gData.dates.length, cData.dates.length); i++) {
      if (i >= gData.dates.length || i >= cData.dates.length) break;
      const g = gData.rows[i][term10G], c = cData.rows[i][term10C];
      if (g != null && c != null) {
        dates.push(gData.dates[i]);
        credits.push(+((c-g)*100).toFixed(2));
      }
    }
    chart.setOption({
      tooltip: { trigger:'axis' },
      grid: { left:50, right:20, top:30, bottom:40 },
      xAxis: { type:'category', data: dates.map(d=>d.slice(0,7)), axisLabel:{rotate:45,fontSize:9,interval:Math.floor(dates.length/12)} },
      yAxis: { type:'value', name:'bp' },
      series: [{ name:'10Y信用溢价', type:'line', data:credits, symbol:'none', lineStyle:{color:'#e74c3c',width:1.5},
        markLine: { silent:true, data:[{type:'average',name:'均值'}], lineStyle:{color:'#888',type:'dashed'} }
      }]
    });
  })();
}

// ═══════════════════════════════════════════════

    '<div class="summary-card"><div class="title">调整信号</div><div class="value" style="color:#999">—</div></div>';

    <tr><td>(2.5%, 3%]</td><td>95%</td><td>2.475</td><td>2.5</td><td>中位：几乎全跟</td></tr>

    <tr><td>(1%, 2%]</td><td>100%</td><td>1.0</td><td>1.0</td><td>低位：完全暴露</td></tr>

  document.querySelectorAll('.chart').forEach(dom => {
    const c = echarts.getInstanceByDom(dom);
    if (c) c.resize();
  });
});

window.addEventListener('load', init);
